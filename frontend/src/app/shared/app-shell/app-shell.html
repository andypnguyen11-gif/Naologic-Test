<div class="app-shell" [class.app-shell--nav-collapsed]="isNavCollapsed">
  <aside class="app-shell__nav" [class.app-shell__nav--collapsed]="isNavCollapsed">
    <div class="app-shell__nav-header">
      <div class="app-shell__brand">
        <img src="/branding/logo/naologic-logo.png" alt="Naologic" />
      </div>

      <button
        class="app-shell__nav-toggle"
        type="button"
        (click)="toggleNav()"
        [attr.aria-label]="isNavCollapsed ? 'Expand navigation' : 'Collapse navigation'"
        [attr.aria-expanded]="!isNavCollapsed"
      >
        <span class="app-shell__nav-toggle-icon" aria-hidden="true"></span>
      </button>
    </div>

    <nav class="app-shell__menu">
      <a routerLink="/app/work-orders" routerLinkActive="is-active" class="app-shell__link">
        <span class="app-shell__link-icon" aria-hidden="true">
          <svg viewBox="0 0 20 20" focusable="false">
            <path d="M3 5.5h14M3 10h14M3 14.5h14" />
          </svg>
        </span>
        <span class="app-shell__link-label">Work Orders</span>
      </a>
      <a routerLink="/app/planning" routerLinkActive="is-active" class="app-shell__link">
        <span class="app-shell__link-icon" aria-hidden="true">
          <svg viewBox="0 0 20 20" focusable="false">
            <path d="M4 15.5V10.5M10 15.5V6.5M16 15.5V3.5" />
          </svg>
        </span>
        <span class="app-shell__link-label">Planning</span>
      </a>
      @if (isAdmin) {
        <a routerLink="/app/admin" routerLinkActive="is-active" class="app-shell__link">
          <span class="app-shell__link-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" focusable="false">
              <path d="M10 3.5 15.5 5.5v4.2c0 3.1-2.1 5.9-5.5 6.8-3.4-.9-5.5-3.7-5.5-6.8V5.5L10 3.5Z" />
            </svg>
          </span>
          <span class="app-shell__link-label">Admin</span>
        </a>
      }
    </nav>

    <div class="app-shell__footer">
      @if (currentUser) {
        <div class="app-shell__user">
          <div class="app-shell__user-name">{{ currentUser.firstName }} {{ currentUser.lastName }}</div>
          <div class="app-shell__user-role">{{ currentUser.role }}</div>
        </div>
      }
      <button class="app-shell__signout" type="button" (click)="onLogout()">
        <span class="app-shell__link-icon" aria-hidden="true">
          <svg viewBox="0 0 20 20" focusable="false">
            <path d="M8 4.5H5.5a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1H8M11.5 7l3 3-3 3M14.5 10H7.5" />
          </svg>
        </span>
        <span class="app-shell__link-label">Sign out</span>
      </button>
    </div>
  </aside>

  <main class="app-shell__content">
    <router-outlet />
  </main>
</div>
