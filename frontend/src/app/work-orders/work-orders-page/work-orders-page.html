<div class="wo-page">
  <div class="wo-brand-row">
    <div class="wo-brand">
      <img src="/branding/logo/naologic-logo.png" alt="Naologic" />
    </div>
    <button class="wo-signout-button" type="button" (click)="onLogout()">
      Sign out
    </button>
  </div>

  <header class="wo-header">
    <div class="wo-title">
      <h1>Work Orders</h1>
      @if (currentUser) {
        <p class="wo-user-meta">
          {{ currentUser.firstName }} {{ currentUser.lastName }} · {{ currentUser.role }}
        </p>
      }
    </div>
  </header>

  <div class="wo-toolbar">
    <div class="wo-header-row">
      <div class="wo-timescale-control">
        <span class="wo-label">Timescale</span>
        <ng-select
          class="wo-timescale-select"
          [items]="timescales"
          [ngModel]="selectedTimescale"
          (ngModelChange)="onTimescaleChange($event)"
          [clearable]="false"
          [searchable]="false"
          [ngModelOptions]="{ standalone: true }"
        />
      </div>
      <button
        class="wo-today-button"
        type="button"
        (click)="onTodayClick()"
        [disabled]="!canScrollToToday"
      >
        Today
      </button>
    </div>
  </div>

  @if (isLoading) {
    <p>Loading work orders...</p>
  }

  @if (loadError) {
    <p>{{ loadError }}</p>
  }

  @if (!isLoading && !loadError) {
    <app-timeline
      [timescaleLabel]="selectedTimescale"
      [workCenters]="workCenters"
      [workOrders]="workOrders"
      [timelineDates]="timelineDates"
      [timelineHeader]="timelineHeader"
      [allowEditing]="canManageWorkOrders"
      (createWorkOrder)="onCreateWorkOrder($event)"
      (editWorkOrder)="onEditWorkOrder($event)"
      (deleteWorkOrder)="onDeleteWorkOrder($event)"
    />
  }

  <app-work-order-panel
    [open]="isPanelOpen"
    [mode]="panelMode"
    [order]="selectedOrder"
    [defaultStartDate]="pendingCreateStartDate"
    [saveError]="panelSaveError"
    (closePanel)="onClosePanel()"
    (saveOrder)="onSaveOrder($event)"
  />
</div>
